version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: penguin
      POSTGRES_PASSWORD: penguin_secret
      POSTGRES_DB: club_penguin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build: .
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: celery -A app.workers.celery_app worker --loglevel=info

volumes:
  pgdata: